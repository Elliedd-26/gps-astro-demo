<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8CEBC"/>
      <stop offset="1" stop-color="#B6A98F"/>
    </linearGradient>
    <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#counter)"/>
  <g opacity="0.10">
    <line x1="0" y1="220" x2="1600" y2="220" stroke="#5C534A" stroke-width="1"/>
    <line x1="0" y1="540" x2="1600" y2="540" stroke="#5C534A" stroke-width="1"/>
  </g>
  <g transform="translate(450, 230) rotate(-3)" filter="url(#noteShadow)">
    <rect width="700" height="440" rx="8" fill="#FAF7F1"/>
    <text x="50" y="160" font-family="Georgia, 'Noto Serif SC', serif" font-size="44" font-style="italic" fill="#4A3870">thank you for letting</text>
    <text x="50" y="220" font-family="Georgia, 'Noto Serif SC', serif" font-size="44" font-style="italic" fill="#4A3870">me cry here</text>
    <text x="50" y="320" font-family="'Noto Serif SC', Georgia, serif" font-size="34" fill="#5C534A">谢谢你让我</text>
    <text x="50" y="370" font-family="'Noto Serif SC', Georgia, serif" font-size="34" fill="#5C534A">在这里哭了</text>
  </g>
</svg>
